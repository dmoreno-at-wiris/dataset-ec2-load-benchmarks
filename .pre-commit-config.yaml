repos:

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.13
    hooks:
      # Run the linter.
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.402
    hooks:
    - id: pyright

  # - repo: local
  #   hooks:
  #     - id: pytest
  #       name: pytest
  #       entry: ./.venv/bin/pytest
  #       language: system
  #       types: [python]
  #       pass_filenames: false
  #       always_run: true

  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.7.13
    hooks:
      - id: uv-lock
